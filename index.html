<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D1114182036 - 星際閃避遊戲</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <img src="logo.svg" alt="星際閃避遊戲 Logo" class="logo" />
      <div>
        <p class="tag">AI 期中報告｜HTML + JavaScript + CSS</p>
        <h1>星際閃避遊戲</h1>
        <p class="desc">使用方向鍵或 WASD 移動太空船，閃避掉落的隕石，撐越久分數越高。</p>
      </div>
    </section>

    <section class="game-card">
      <div class="info-bar">
        <div>分數：<span id="score">0</span></div>
        <div>最高分：<span id="bestScore">0</span></div>
        <button id="startBtn">開始遊戲</button>
      </div>

      <canvas id="gameCanvas" width="420" height="620"></canvas>

      <div class="mobile-controls">
        <button id="leftBtn">←</button>
        <button id="rightBtn">→</button>
      </div>

      <p class="hint">電腦：← → 或 A D 移動｜手機：按下方左右鍵移動</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
